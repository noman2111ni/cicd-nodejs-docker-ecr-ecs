name: CI/CD pipeline
on:
  push:
    branches:
      - main
jobs:
  build:
     name: Build
     runs-on: ubuntu-latest
     steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build the project
        run: npm run build
  test:
     name: Test
     needs: build
     runs-on: ubuntu-latest
     steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
  deploy:
     name: Deploy
     needs: test
     runs-on: ubuntu-latest
     steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: Deploy to production
          run: echo "Deploying to production environment..."
